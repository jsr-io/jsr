name: Algolia Package Reindex

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment for deployment"
        type: choice
        options:
          - prod
          - staging
        required: true

jobs:
  reindex_algolia:
    runs-on: ubuntu-22.04
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
      - name: Deploy
        env:
          ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_PACKAGES_INDEX: ${{ github.event.inputs.environment }}_packages
          JSR_ENDPOINT_URL: ${{ vars.ENVIRONMENT_URL }}
        run: deno task tools:algolia:packages_reindex
