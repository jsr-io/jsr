name = "jsr-api"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[build]
command = "worker-build --release"

# Production bindings (the Hyperdrive config, compute-service URL, OAuth/Orama
# config) are managed by Terraform, like the frontend/lb Workers. For local
# `wrangler dev`, the Hyperdrive binding's connection string comes from the
# WRANGLER_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE environment variable.
[[hyperdrive]]
binding = "HYPERDRIVE"
