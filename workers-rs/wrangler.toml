name = "jsr-api"
main = "build/worker/shim.mjs"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

# workers-rs bundles are produced by `worker-build`, which compiles this crate
# to `wasm32-unknown-unknown` and emits the JS shim + `.wasm` under `build/`.
[build]
command = "worker-build --release"

# NOTE: this file exists for local development (`wrangler dev`) only. The
# production deployment and its real bindings (the Hyperdrive config id, the
# compute-service URL/service binding, OAuth + Orama config) are managed by
# Terraform in a later infra PR, mirroring `terraform/cloudflare_frontend.tf`.

# Hyperdrive binding (DB access). In production this points at a Terraform-
# managed `cloudflare_hyperdrive_config` fronting the Cloud SQL Postgres; the
# `id` below is a dev placeholder. `localConnectionString` makes `wrangler dev`
# bypass Hyperdrive and talk straight to the local Postgres from
# `docker-compose.yml` (see `api/.env.example`), so the Worker's DB path can be
# exercised without any Cloudflare account.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "00000000000000000000000000000000"
localConnectionString = "postgres://user:password@localhost:5432/registry"
